<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowPro Core Mastery Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'app-bg': 'var(--app-bg)', 'card-bg': 'var(--card-bg)',
                        'accent': 'var(--accent)', 'txt-main': 'var(--txt-main)',
                        'txt-muted': 'var(--txt-muted)', 'border-clr': 'var(--border-clr)',
                    }
                }
            }
        }
    </script>
    <style>
        :root { --app-bg: #f8fafc; --card-bg: #ffffff; --accent: #2563eb; --txt-main: #1e293b; --txt-muted: #64748b; --border-clr: #e2e8f0; }
        .dark { --app-bg: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --txt-main: #f1f5f9; --txt-muted: #94a3b8; --border-clr: #334155; }
        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { width: 8px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--app-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-clr); border-radius: 10px; }

        .opt-correct { border-color: #10b981 !important; background-color: rgba(16, 185, 129, 0.1) !important; color: #10b981 !important; }
        .opt-incorrect { border-color: #ef4444 !important; background-color: rgba(239, 68, 68, 0.1) !important; color: #ef4444 !important; }
        .opt-strike { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); transform: scale(0.98); }
        .step-badge { background: var(--accent); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 900; margin-right: 14px; display: inline-block; }
        
        .max-w-6xl { max-width: 95% !important; width: 1400px; transition: all 0.4s ease; margin-bottom: 50px; }
        
        .nav-scroller { display: flex; align-items: center; gap: 0.5rem; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .nav-scroller::-webkit-scrollbar { display: none; }

        .nav-pass { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
        .nav-fail { background-color: #ef4444 !important; color: white !important; border-color: #ef4444 !important; }
        .nav-completed { border-color: var(--accent) !important; color: var(--accent) !important; }
        .nav-active { border-width: 3px !important; transform: scale(1.05); z-index: 10; border-color: var(--accent) !important; }

        body.focus-active #main-nav, body.focus-active #sidebar-nav { display: none !important; }
        body.focus-active .max-w-6xl { width: 900px !important; margin-top: 40px; }
        
        .pass-badge { background: #10b981; color: white; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .fail-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body id="app-body" class="bg-app-bg min-h-screen font-sans text-txt-main transition-colors duration-300 pb-20 select-none overflow-x-hidden">

    <div id="audit-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-[300] flex items-center justify-center p-2 md:p-8">
        <div class="bg-card-bg w-full max-w-[95vw] h-full max-h-[95vh] overflow-hidden flex flex-col rounded-[2rem] border border-border-clr shadow-2xl relative">
            <div class="p-6 border-b border-border-clr flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h3 id="audit-title" class="text-2xl font-black uppercase text-accent leading-none">Exam Audit</h3>
                    <p id="audit-subtitle" class="text-[10px] font-black uppercase opacity-50 mt-1 tracking-widest"></p>
                </div>
                <div id="audit-filters" class="flex bg-app-bg p-1 rounded-2xl border border-border-clr gap-1">
                    <button onclick="filterAudit('all')" id="filter-all" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-accent text-white">All</button>
                    <button onclick="filterAudit('errors')" id="filter-errors" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-txt-muted hover:bg-red-500/10 hover:text-red-500">Errors</button>
                    <button onclick="filterAudit('unfinished')" id="filter-unfinished" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all text-txt-muted hover:bg-accent/10 hover:text-accent">Unfinished</button>
                </div>
                <button onclick="closeAudit()" class="bg-accent/10 text-accent px-6 py-2 rounded-full transition font-black text-xs uppercase">Close</button>
            </div>
            <div id="audit-content" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-10 scroll-smooth"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto py-8 px-4">
        <nav id="main-nav" class="flex flex-col md:flex-row justify-between items-center mb-8 bg-card-bg p-4 md:p-5 rounded-3xl shadow-sm border border-border-clr gap-4">
            <h1 onclick="showView('home-view')" class="text-xl font-black italic cursor-pointer uppercase border-b-2 border-accent shrink-0">SnowPro Prep</h1>
            <div class="nav-scroller w-full md:w-auto justify-center md:justify-end">
                <button id="focus-toggle" class="hidden px-3 py-2 text-[10px] font-black uppercase text-accent border border-accent/20 rounded-xl" onclick="toggleFocus()">Focus</button>
                <button onclick="showView('library-view')" class="px-3 py-2 text-[10px] font-black text-txt-main uppercase transition-all hover:text-accent">Library</button>
                <button onclick="showView('analytics-view')" class="px-3 py-2 text-[10px] font-black text-txt-main uppercase transition-all hover:text-accent">Insights</button>
                <button onclick="showView('lab-view')" class="bg-red-500 text-white px-4 py-2 rounded-full text-[10px] font-black uppercase shadow-lg shadow-red-500/20 active:scale-95 transition-all">The Lab</button>
                <button onclick="toggleDarkMode()" class="p-2.5 rounded-2xl bg-app-bg border border-border-clr hover:bg-border-clr transition-all">🌙</button>
            </div>
        </nav>

        <div class="flex flex-col lg:flex-row gap-8">
            <main class="flex-1 min-w-0">
                <section id="home-view" class="space-y-10">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-card-bg p-8 rounded-[2rem] border border-border-clr text-center">
                            <p class="text-[10px] font-black uppercase opacity-50 mb-1">Banks</p>
                            <h3 id="stat-banks" class="text-4xl font-black">0</h3>
                        </div>
                        <div class="bg-card-bg p-8 rounded-[2rem] border border-border-clr text-center">
                            <p class="text-[10px] font-black uppercase opacity-50 mb-1">Total Takes</p>
                            <h3 id="stat-attempts" class="text-4xl font-black">0</h3>
                        </div>
                        <div class="bg-card-bg p-8 rounded-[2rem] border border-border-clr text-center">
                            <p class="text-[10px] font-black uppercase opacity-50 mb-1">Avg Accuracy</p>
                            <h3 id="stat-acc" class="text-4xl font-black text-accent">0%</h3>
                        </div>
                    </div>
                    <h2 class="text-4xl font-black italic uppercase text-accent tracking-tighter">Launcher</h2>
                    <div id="quick-launch-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </section>

                <section id="library-view" class="hidden space-y-8">
                    <div class="flex justify-between items-center">
                        <h2 class="text-4xl font-black italic uppercase">Library</h2>
                        <input type="file" id="file-selector" multiple accept=".json" class="hidden" onchange="handleFileSelect(event)">
                        <button onclick="document.getElementById('file-selector').click()" class="bg-accent text-white px-8 py-3 rounded-2xl font-black text-[10px] uppercase">Import JSON</button>
                    </div>
                    <div id="bank-list" class="space-y-4"></div>
                </section>

                <section id="quiz-view" class="hidden bg-card-bg rounded-[2rem] border border-border-clr shadow-2xl p-6 md:p-16 relative">
                    <div class="flex flex-col gap-6 mb-10">
                        <div class="flex justify-between items-start">
                            <div id="q-meta" class="text-[11px] font-black text-accent uppercase tracking-widest"></div>
                            <div class="flex gap-2">
                                <button id="focus-exit" class="hidden px-4 py-2 rounded-full text-[10px] font-black uppercase bg-accent text-white" onclick="toggleFocus()">Exit Focus</button>
                                <button id="clear-seq-btn" onclick="clearCurrentSelection()" class="hidden px-4 py-2 rounded-full text-[10px] font-black uppercase border-2 border-red-500/20 text-red-500">Clear</button>
                                <div id="instant-badge" class="hidden px-5 py-2 rounded-full text-[10px] font-black uppercase text-white shadow-lg"></div>
                            </div>
                        </div>
                        <div class="w-full bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
                            <div id="exam-progress-bar" class="bg-accent h-full transition-all duration-500 w-0"></div>
                        </div>
                    </div>
                    <div id="explanation-box" class="hidden mb-8 p-6 bg-accent/5 border-l-4 border-accent rounded-xl"></div>
                    <h2 id="q-text" class="text-xl font-semibold mb-10 leading-relaxed text-txt-main"></h2>
                    <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-14"></div>
                    <div class="flex gap-4">
                        <button id="action-btn" class="flex-1 bg-accent text-white font-black py-5 rounded-2xl shadow-xl uppercase text-xs active:scale-95 transition-all"></button>
                        <button onclick="nextQuestion(true)" class="px-6 md:px-14 bg-app-bg border-2 border-border-clr text-txt-muted font-black rounded-2xl uppercase text-[10px]">Skip</button>
                    </div>
                </section>

                <section id="results-view" class="hidden flex flex-col items-center justify-center space-y-8 py-10">
                    <div class="bg-card-bg w-full max-w-2xl p-12 rounded-[3rem] border-4 border-border-clr text-center shadow-2xl animate-pop" id="results-card">
                        <p class="text-xs font-black uppercase text-txt-muted tracking-[0.3em] mb-4">Session Complete</p>
                        <h2 id="result-exam-name" class="text-2xl font-black italic uppercase mb-10">Exam Name</h2>
                        
                        <div class="flex flex-col items-center justify-center mb-10">
                            <h3 id="result-scaled-score" class="text-8xl font-black leading-none tracking-tighter">000</h3>
                            <p class="text-sm font-black uppercase opacity-50 mt-2">Scaled Score / 1000</p>
                        </div>

                        <div id="result-status-box" class="py-4 px-10 rounded-2xl inline-block text-white font-black uppercase tracking-widest text-xl mb-10">
                            STATUS
                        </div>

                        <div class="grid grid-cols-2 gap-4 border-t border-border-clr pt-10">
                            <div>
                                <p class="text-[10px] font-black uppercase opacity-40">Correct Items</p>
                                <p id="result-raw-score" class="text-2xl font-black">0/0</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black uppercase opacity-40">Percentage</p>
                                <p id="result-percentage" class="text-2xl font-black">0%</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 w-full max-w-2xl">
                        <button onclick="showView('lab-view')" class="flex-1 py-5 bg-card-bg border-2 border-border-clr rounded-2xl font-black uppercase text-xs">View Detailed Logs</button>
                        <button onclick="showView('home-view')" class="flex-1 py-5 bg-accent text-white rounded-2xl font-black uppercase text-xs shadow-xl">Back to Launcher</button>
                    </div>
                </section>

                <section id="analytics-view" class="hidden space-y-10">
                    <h2 class="text-4xl font-black italic uppercase text-accent tracking-tighter">Insights</h2>
                    <div id="topic-proficiency-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-card-bg p-8 rounded-[2.5rem] border border-border-clr shadow-sm"></div>
                </section>

                <section id="lab-view" class="hidden space-y-10">
                    <h2 class="text-4xl font-black italic uppercase text-red-500 tracking-tighter">The Lab</h2>
                    <div id="merged-history-list" class="space-y-4"></div>
                </section>
            </main>

            <aside id="sidebar-nav" class="hidden w-full lg:w-80 shrink-0">
                <div class="bg-card-bg p-6 rounded-[2rem] border border-border-clr shadow-sm">
                    <div class="mb-6 p-4 bg-app-bg rounded-2xl border border-border-clr text-center">
                        <p id="timer-label" class="text-[9px] font-black uppercase text-txt-muted mb-1 tracking-widest">Timer</p>
                        <h4 id="timer-display" class="text-2xl font-black text-accent tabular-nums">00:00:00</h4>
                    </div>
                    <div id="nav-grid" class="flex flex-wrap gap-2 mb-6 pr-3 justify-center max-h-[50vh] overflow-y-auto p-1 lg:grid"></div>
                    <button onclick="confirmFinishExam()" class="w-full py-4 bg-accent text-white text-xs font-black rounded-2xl uppercase shadow-xl transition-all hover:brightness-110">Submit Session</button>
                </div>
            </aside>
        </div>
    </div>

    <div id="config-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-card-bg w-full max-w-md p-8 rounded-[2.5rem] border border-border-clr shadow-2xl">
            <h3 class="text-2xl font-black uppercase mb-8">Session Settings</h3>
            <div class="space-y-6 mb-10">
                <div>
                    <label class="text-[10px] font-black uppercase mb-2 block opacity-50 tracking-widest">Time Limit (Min)</label>
                    <input type="number" id="config-time" value="115" class="w-full bg-app-bg border border-border-clr p-4 rounded-xl font-bold text-accent outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase mb-2 block opacity-50 tracking-widest">Questions</label>
                    <input type="number" id="config-count" value="100" class="w-full bg-app-bg border border-border-clr p-4 rounded-xl font-bold text-accent outline-none">
                </div>
            </div>
            <button id="start-btn-confirm" class="w-full bg-accent text-white py-5 rounded-2xl font-black uppercase text-xs">Start Session</button>
        </div>
    </div>

    <script>
        const getVault = () => JSON.parse(localStorage.getItem('quiz_vault') || '[]');
        const getHistory = () => JSON.parse(localStorage.getItem('snowflake_final_log') || '[]');
        let currentBank, currentIdx, examState, currentMode, timerInterval, timeElapsed, timeRemaining;
        
        function showView(id) {
            const views = ['home-view','library-view','quiz-view','results-view','analytics-view','lab-view','sidebar-nav'];
            views.forEach(v => document.getElementById(v)?.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const isQuiz = id === 'quiz-view';
            document.getElementById('sidebar-nav').classList.toggle('hidden', !isQuiz);
            document.getElementById('focus-toggle').classList.toggle('hidden', !isQuiz);
            if(id === 'home-view') renderDashboard();
            if(id === 'library-view') renderLibrary();
            if(id === 'analytics-view') renderAnalytics();
            if(id === 'lab-view') renderLab();
            if(!isQuiz && id !== 'results-view') clearInterval(timerInterval);
        }

        function renderDashboard() {
            const lib = getVault(), hist = getHistory();
            document.getElementById('stat-banks').innerText = lib.length;
            document.getElementById('stat-attempts').innerText = hist.length;
            if(hist.length) {
                const total = hist.reduce((a,c) => a + c.total, 0), score = hist.reduce((a,c) => a + c.score, 0);
                document.getElementById('stat-acc').innerText = Math.round((score/total)*100) + "%";
            }
            const grid = document.getElementById('quick-launch-grid');
            grid.innerHTML = lib.length ? lib.map(b => `
                <div class="bg-card-bg p-8 rounded-[2.5rem] border border-border-clr shadow-sm hover:border-accent transition-all">
                    <h4 class="font-black italic uppercase mb-4 text-lg truncate">${b.name}</h4>
                    <div class="flex gap-2">
                        <button onclick="openConfig('${b.id}','practice')" class="flex-1 bg-accent/10 text-accent font-black py-4 rounded-xl text-[10px] uppercase border border-accent/20">Practice</button>
                        <button onclick="openConfig('${b.id}','test')" class="flex-1 btn-simulator font-black py-4 rounded-xl text-[10px] uppercase shadow-lg">Simulator</button>
                    </div>
                </div>`).join('') : '<p class="opacity-50 text-center col-span-full py-10">No banks in library.</p>';
        }

        function renderLibrary() {
            const lib = getVault(), container = document.getElementById('bank-list');
            container.innerHTML = lib.length ? lib.map(b => `
                <div class="bg-card-bg p-6 rounded-2xl border border-border-clr flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-black italic uppercase text-txt-main">${b.name}</h3>
                        <p class="text-[10px] opacity-50 uppercase font-black tracking-widest">${b.questions.length} Questions</p>
                    </div>
                    <button onclick="deleteBank('${b.id}')" class="text-red-500 font-black text-[10px] uppercase bg-red-500/10 px-4 py-2 rounded-xl hover:bg-red-500 hover:text-white transition">Delete</button>
                </div>`).join('') : '<p class="opacity-50 text-center p-12 border-2 border-dashed border-border-clr rounded-[2rem]">Empty Vault.</p>';
        }

        async function handleFileSelect(e) {
            let lib = getVault();
            for(let file of e.target.files) {
                try {
                    const data = JSON.parse(await file.text());
                    const qs = data.questions || (Array.isArray(data) ? data : []);
                    if(qs.length) lib.push({ id: Date.now() + Math.random(), name: data.exam || file.name.replace('.json',''), questions: qs });
                } catch(err) { alert("Error parsing JSON"); }
            }
            localStorage.setItem('quiz_vault', JSON.stringify(lib));
            renderLibrary(); renderDashboard();
        }

        function deleteBank(id) {
            if(confirm("Delete this bank?")) {
                let lib = getVault().filter(b => b.id.toString() !== id.toString());
                localStorage.setItem('quiz_vault', JSON.stringify(lib));
                renderLibrary(); renderDashboard();
            }
        }

        function openConfig(id, mode) {
            currentBank = getVault().find(b => b.id.toString() === id.toString());
            currentMode = mode;
            document.getElementById('config-count').value = currentBank.questions.length;
            document.getElementById('start-btn-confirm').onclick = () => startExam();
            document.getElementById('config-modal').classList.remove('hidden');
        }

        function startExam(qsToUse = null) {
            document.getElementById('config-modal').classList.add('hidden');
            let qs = qsToUse || [...currentBank.questions];
            if(!qsToUse) {
                const limit = parseInt(document.getElementById('config-count').value);
                if(limit > 0 && limit < qs.length) qs = qs.sort(() => Math.random() - 0.5).slice(0, limit);
            }
            examState = qs.map(q => ({
                ...q,
                shuffledOptions: Object.entries(q.options).map(p => ({key:p[0], value:p[1]})).sort(() => Math.random() - 0.5),
                selectedKeys: [], isChecked: false, isCorrect: false, struckKeys: []
            }));
            currentIdx = 0; timeElapsed = 0; timeRemaining = parseInt(document.getElementById('config-time').value) * 60;
            startTimer(); showView('quiz-view'); buildNavGrid(); showQuestion(true); 
        }

        function showQuestion(shouldScroll = false) {
            if(shouldScroll) window.scrollTo({ top: 0, behavior: 'smooth' });
            const q = examState[currentIdx], isSeq = q.answer_type === "sequence";
            document.getElementById('q-meta').innerText = `ITEM ${currentIdx + 1} / ${examState.length}`;
            document.getElementById('exam-progress-bar').style.width = ((currentIdx+1)/examState.length*100) + '%';
            document.getElementById('q-text').innerText = q.text;
            document.getElementById('clear-seq-btn').classList.toggle('hidden', !isSeq || q.isChecked);
            const explBox = document.getElementById('explanation-box');
            explBox.classList.toggle('hidden', !(q.isChecked && q.explanation));
            if(q.isChecked && q.explanation) explBox.innerHTML = `<p class="text-[10px] font-black text-accent uppercase mb-2">Reasoning</p><p class="text-sm italic">${q.explanation}</p>`;
            const badge = document.getElementById('instant-badge');
            badge.classList.toggle('hidden', !q.isChecked);
            if(q.isChecked) { badge.innerText = q.isCorrect ? "PASS ✓" : "FAIL ✗"; badge.style.backgroundColor = q.isCorrect ? "#10b981" : "#ef4444"; }
            const btn = document.getElementById('action-btn');
            btn.innerText = q.isChecked ? 'Next' : 'Confirm'; 
            btn.onclick = q.isChecked ? () => nextQuestion(true) : handleAction;
            const container = document.getElementById('options-container'); container.innerHTML = '';
            
            q.shuffledOptions.forEach(opt => {
                const stepIdx = q.selectedKeys.indexOf(opt.key), isSel = stepIdx !== -1;
                // FIX: Only apply the strike class if the question hasn't been checked/submitted yet.
                const isStruck = q.struckKeys.includes(opt.key) && !q.isChecked;
                
                const div = document.createElement('div');
                div.className = `flex items-center p-5 border-2 rounded-2xl cursor-pointer transition-all ${isSel ? 'border-accent bg-accent/5' : 'border-border-clr'} ${isStruck ? 'opt-strike' : ''}`;
                
                if(q.isChecked) {
                    const corr = Array.isArray(q.answer) ? q.answer : [q.answer];
                    const isPartCorrect = isSeq ? (q.answer[stepIdx] === opt.key) : corr.includes(opt.key);
                    if(isSel) div.classList.add(isPartCorrect ? 'opt-correct' : 'opt-incorrect');
                    else if(corr.includes(opt.key)) div.classList.add('border-dashed', 'border-green-500');
                }
                
                div.onclick = () => { if(!q.isChecked) toggleItem(opt.key); };
                div.oncontextmenu = (e) => { e.preventDefault(); if(!q.isChecked) toggleStrike(opt.key); };
                div.innerHTML = ((isSel && isSeq) ? `<span class="step-badge">STEP ${stepIdx+1}</span>` : "") + `<span>${opt.value}</span>`;
                container.appendChild(div);
            });
            updateNavUI();
        }

        function toggleItem(key) {
            const q = examState[currentIdx], isSeq = q.answer_type === "sequence", max = Array.isArray(q.answer) ? q.answer.length : 1;
            if(q.selectedKeys.includes(key)) q.selectedKeys = q.selectedKeys.filter(k => k !== key);
            else {
                if(!isSeq && !Array.isArray(q.answer)) q.selectedKeys = [];
                if(q.selectedKeys.length < max) q.selectedKeys.push(key);
            }
            showQuestion(false); 
        }

        function toggleStrike(key) {
            const q = examState[currentIdx];
            q.struckKeys = q.struckKeys.includes(key) ? q.struckKeys.filter(k => k !== key) : [...q.struckKeys, key];
            showQuestion(false);
        }

        function handleAction() {
            const q = examState[currentIdx]; if(!q.selectedKeys.length) return;
            if(q.answer_type === "sequence") q.isCorrect = q.answer.length === q.selectedKeys.length && q.answer.every((v,i) => v === q.selectedKeys[i]);
            else if(Array.isArray(q.answer)) q.isCorrect = q.answer.length === q.selectedKeys.length && q.answer.every(v => q.selectedKeys.includes(v));
            else q.isCorrect = q.answer === q.selectedKeys[0];
            q.isChecked = true; showQuestion(false); 
        }

        function buildNavGrid() {
            const g = document.getElementById('nav-grid'); g.innerHTML = '';
            examState.forEach((_,i) => {
                const b = document.createElement('button'); b.id=`nav-btn-${i}`;
                b.className="w-10 h-10 border-2 rounded-xl text-[10px] font-black border-border-clr flex items-center justify-center shrink-0";
                b.innerText=i+1; b.onclick=()=>{currentIdx=i;showQuestion(true);};
                g.appendChild(b);
            });
        }

        function updateNavUI() {
            examState.forEach((q, i) => {
                const b = document.getElementById(`nav-btn-${i}`); if (!b) return;
                b.classList.remove('nav-active', 'nav-pass', 'nav-fail', 'nav-completed');
                if (q.isChecked) b.classList.add(q.isCorrect ? 'nav-pass' : 'nav-fail');
                else if (q.selectedKeys.length > 0) b.classList.add('nav-completed');
                if (i === currentIdx) b.classList.add('nav-active');
            });
        }

        function nextQuestion(shouldScroll = true) { 
            if(currentIdx < examState.length - 1) { currentIdx++; showQuestion(shouldScroll); } else { finishExam(); } 
        }
        function confirmFinishExam() { if(confirm("Submit Session?")) finishExam(); }
        
        function finishExam() {
            clearInterval(timerInterval);
            const totalQs = examState.length;
            const correctQs = examState.filter(s => s.isCorrect).length;
            const scaledScore = Math.round((correctQs / totalQs) * 1000);
            const percentage = Math.round((correctQs / totalQs) * 100);
            const passed = scaledScore >= 700;

            // Setup Result Page
            document.getElementById('result-exam-name').innerText = currentBank.name;
            document.getElementById('result-scaled-score').innerText = scaledScore;
            document.getElementById('result-scaled-score').className = `text-8xl font-black leading-none tracking-tighter ${passed ? 'text-green-500' : 'text-red-500'}`;
            document.getElementById('result-raw-score').innerText = `${correctQs} / ${totalQs}`;
            document.getElementById('result-percentage').innerText = `${percentage}%`;
            document.getElementById('result-status-box').innerText = passed ? "Passed" : "Failed";
            document.getElementById('result-status-box').style.backgroundColor = passed ? "#10b981" : "#ef4444";
            document.getElementById('results-card').style.borderColor = passed ? "#10b981" : "#ef4444";

            showView('results-view');

            if (passed) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#38bdf8', '#ffffff', '#2563eb'] });
            }

            const h = getHistory();
            h.unshift({ id: Date.now(), exam: currentBank.name, timestamp: new Date().toLocaleString(), score: correctQs, total: totalQs, scaledScore: scaledScore, passed: passed, details: JSON.parse(JSON.stringify(examState)) });
            localStorage.setItem('snowflake_final_log', JSON.stringify(h.slice(0,50)));
        }

        function renderLab() {
            const hist = getHistory(), container = document.getElementById('merged-history-list');
            container.innerHTML = hist.length ? hist.map(h => `
                <div class="bg-card-bg p-6 rounded-2xl border ${h.passed ? 'border-green-500/30' : 'border-red-500/30'} flex justify-between items-center shadow-sm">
                    <div>
                        <h3 class="font-black italic uppercase text-txt-main">${h.exam}</h3>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="${h.passed ? 'pass-badge' : 'fail-badge'}">${h.passed ? 'Pass' : 'Fail'}</span>
                            <span class="text-[14px] font-black">${h.scaledScore} / 1000</span>
                            <span class="text-[9px] opacity-40 uppercase font-black">${h.timestamp}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="auditAttempt(${h.id})" class="bg-accent/10 text-accent px-5 py-2 rounded-xl text-[9px] font-black uppercase">Audit</button>
                        ${!h.passed ? `<button onclick="retakeErrors(${h.id})" class="bg-red-500 text-white px-5 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg">Retake</button>` : ''}
                    </div>
                </div>`).join('') : '<p class="opacity-50 text-center py-10">No logs.</p>';
        }

        function retakeErrors(id) {
            const att = getHistory().find(h => h.id === id); if(!att) return;
            const errs = att.details.filter(q => !q.isCorrect).map(q => ({...q, isChecked:false, isCorrect:false, selectedKeys:[], struckKeys:[]}));
            currentBank = { name: "Errors: " + att.exam, id: "err", questions: errs };
            startExam(errs);
        }

        function auditAttempt(id) {
            const hist = getHistory().find(h => h.id === id); if(!hist) return;
            activeAuditData = hist;
            document.getElementById('audit-subtitle').innerText = `${hist.exam} — ${hist.timestamp}`;
            filterAudit('all'); document.getElementById('audit-modal').classList.remove('hidden');
        }

        function filterAudit(type) {
            const items = type === 'all' ? activeAuditData.details : (type === 'errors' ? activeAuditData.details.filter(q => q.isChecked && !q.isCorrect) : activeAuditData.details.filter(q => !q.isChecked));
            document.getElementById('audit-content').innerHTML = items.map((q, idx) => `
                <div class="p-8 rounded-[2rem] border-2 ${!q.isChecked ? 'border-border-clr' : (q.isCorrect ? 'border-green-500/20 bg-green-500/5' : 'border-red-500/20 bg-red-500/5')}">
                    <p class="text-[10px] font-black uppercase opacity-50 mb-4">Item #${idx + 1}</p>
                    <p class="font-bold text-xl mb-6">${q.text}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-4 bg-app-bg rounded-xl border border-border-clr">
                            <p class="text-[9px] font-black uppercase opacity-50">Response</p>
                            <p class="${q.isCorrect ? 'text-green-500' : 'text-red-500'} font-bold">${q.selectedKeys.map(k => q.options[k]).join(", ") || 'None'}</p>
                        </div>
                        <div class="p-4 bg-app-bg rounded-xl border border-border-clr">
                            <p class="text-[9px] font-black uppercase opacity-50">Expected</p>
                            <p class="text-green-500 font-bold">${Array.isArray(q.answer) ? q.answer.map(k => q.options[k]).join(", ") : q.options[q.answer]}</p>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderAnalytics() {
            const hist = getHistory(), radar = document.getElementById('topic-proficiency-container');
            const tops = {}; hist.flatMap(h => h.details).forEach(q => {
                const c = q.category1 || "General"; if(!tops[c]) tops[c] = {c:0, t:0}; tops[c].t++; if(q.isCorrect) tops[c].c++;
            });
            radar.innerHTML = Object.entries(tops).map(([n, d]) => {
                const p = Math.round((d.c/d.t)*100);
                return `<div class="space-y-1"><div class="flex justify-between text-[9px] font-black uppercase"><span>${n}</span><span>${p}%</span></div><div class="h-1 bg-app-bg rounded-full border border-border-clr"><div class="h-full bg-accent" style="width:${p}%"></div></div></div>`;
            }).join('');
        }

        function toggleFocus() { const active = document.body.classList.toggle('focus-active'); document.getElementById('focus-toggle').innerText = active ? "Focus On" : "Focus"; }
        function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { if(currentMode === 'test') { timeRemaining--; updateTimer(timeRemaining); if(timeRemaining <= 0) finishExam(); } else { timeElapsed++; updateTimer(timeElapsed); } }, 1000); }
        function updateTimer(s) { const h = Math.floor(s/3600).toString().padStart(2,'0'), m = Math.floor((s%3600)/60).toString().padStart(2,'0'), sec = (s%60).toString().padStart(2,'0'); document.getElementById('timer-display').innerText = h + ":" + m + ":" + sec; }
        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
        function clearHistory() { if(confirm("Reset logs?")) { localStorage.setItem('snowflake_final_log', '[]'); renderLab(); renderAnalytics(); renderDashboard(); }}
        function closeAudit() { document.getElementById('audit-modal').classList.add('hidden'); }
        function clearCurrentSelection() { examState[currentIdx].selectedKeys = []; showQuestion(); }
        
        window.onload = () => { showView('home-view'); };
    </script>
</body>
</html>
